# =============================================================================
# SUPER AI GATEWAY — config.yaml
# Self-hosted LLM gateway combining free + paid providers with:
#   - Multi-key rotation per provider
#   - SOCKS5/HTTP proxy support via v-proxies.com
#   - Automatic fallback (free → paid last)
#   - SHA-256 + Semantic response caching
#   - Multi-engine web search (SearXNG, Exa, Parallel, Firecrawl)
#   - OpenAI-compatible /v1/chat/completions
#   - Meta-models: "free-fast", "free-smart", "fallback-all"
#   - Token compression (RTK-style input, caveman-style output)
#   - PII redaction guardrails
#   - Spend tracking per virtual key
#   - Prometheus metrics, adaptive load balancing
# =============================================================================

port: 3000

# Global outbound proxy (SOCKS5 or HTTP). All provider requests route through this.
# Uses v-proxies.com residential proxies for key rotation pools.
global_proxy: ""  # e.g. "socks5://user:pass@proxy.v-proxies.com:1080"

# =============================================================================
# KEY ROTATION
# =============================================================================
key_rotation:
  enabled: true
  strategy: least_used       # round_robin | least_used | weighted | random | tiered
  cooldown: 30s              # key cooldown after 429
  max_cooldown: 5m           # exponential backoff cap
  tiered: false              # LLM-API-Key-Proxy style escalating cooldown tiers

# =============================================================================
# FALLBACK / RETRY
# =============================================================================
fallback:
  enabled: true
  max_attempts: 5             # max providers to try before giving up
  retry_delay: 500ms
  backoff_factor: 2.0
  paid_only_after_free_failure: true   # NEVER touch paid providers until all free exhausted

# =============================================================================
# RESPONSE CACHE (Exact SHA-256)
# =============================================================================
cache:
  enabled: true
  ttl: 30m                    # cache lifetime
  max_size: 10000             # max cached entries (LRU eviction)

# =============================================================================
# SEMANTIC CACHE (Similarity-based, from Bifrost)
# =============================================================================
semantic_cache:
  enabled: true
  max_size: 5000
  similarity_threshold: 0.85  # 0.0-1.0, higher = stricter match
  ttl: 15m

# =============================================================================
# GUARDRAILS / PII REDACTION (from Portkey)
# =============================================================================
guardrails:
  enabled: true
  pii_redact: true            # redact emails, phones, SSNs, keys from prompts
  content_filter: false       # block harmful content
  max_input_length: 0         # 0 = unlimited, else truncate prompts

# =============================================================================
# TOKEN COMPRESSION (RTK-style input + Caveman output, from 9Router)
# =============================================================================
compression:
  input_compression: false    # compress prompts before sending to LLM
  output_compression: false   # compress LLM responses (caveman mode)
  level: light                # light | medium | aggressive

# =============================================================================
# SPEND TRACKING (from LiteLLM/Portkey)
# =============================================================================
spend_tracking:
  enabled: true
  daily_budget: 1000000       # tokens per virtual key per day

# =============================================================================
# PROMETHEUS METRICS (from Bifrost/Portkey)
# =============================================================================
metrics:
  enabled: true
  path: "/metrics"

# =============================================================================
# ADAPTIVE LOAD BALANCING (from Bifrost)
# =============================================================================
adaptive_routing:
  enabled: true
  window_size: 100            # recent requests to consider for latency/health
  prefer_low_latency: true    # route to fastest healthy provider

# =============================================================================
# WEB SEARCH (Multi-engine: SearXNG + Exa + Parallel + Firecrawl)
# =============================================================================
search:
  enabled: true
  searxng_url: "http://searxng:8080"   # self-hosted SearXNG
  exa_api_key: ""                       # Exa.ai API key
  parallel_api_key: ""                  # Parallel.ai API key
  firecrawl_url: "https://fire.v244.net:3002"   # self-hosted Firecrawl
  firecrawl_api_key: ""                 # Firecrawl API key

# =============================================================================
# META-MODELS — virtual models that route to the best provider
# =============================================================================
meta_models:
  free-fast:
    strategy: fastest
    models:
      - "groq/llama-3.3-70b-versatile"
      - "cerebras/llama3.1-8b"
      - "deepseek/deepseek-chat"
  free-smart:
    strategy: smartest
    models:
      - "cerebras/gpt-oss-120b"
      - "groq/llama-3.3-70b-versatile"
      - "chutes/Qwen/Qwen2.5-72B-Instruct"
  fallback-all:
    strategy: fallback
    models:
      - "groq/llama-3.3-70b-versatile"
      - "cerebras/llama3.1-8b"
      - "deepseek/deepseek-chat"
      - "cloudflare/@cf/meta/llama-3.3-70b-instruct"
      - "novita/meta-llama/llama-3.1-70b-instruct"
      - "chutes/meta-llama/Llama-3.1-70B-Instruct"
      - "nvidia/meta/llama-3.3-70b-instruct"
      - "ollama/llama3.3:70b"
      - "opencode-zen/deepseek-v4-flash-free"
      - "openrouter/meta-llama/llama-4-scout:free"

# =============================================================================
# PROVIDERS
# =============================================================================
providers:

  # ---- FREE TIER PROVIDERS (used first in fallback order) ----

  groq:
    name: groq
    base_url: "https://api.groq.com/openai/v1"
    api_key: "$GROQ_API_KEY"          # set GROQ_API_KEY=k1,k2,k3 for multi-key
    tier: free
    priority: 1
    timeout: 30s
    models:
      - "llama-3.3-70b-versatile"
      - "llama-3.1-8b-instant"
      - "mixtral-8x7b-32768"
      - "gemma2-9b-it"
      - "deepseek-r1-distill-llama-70b"

  cerebras:
    name: cerebras
    base_url: "https://api.cerebras.ai/v1"
    api_key: "$CEREBRAS_API_KEY"
    tier: free
    priority: 2
    timeout: 30s
    models:
      - "gpt-oss-120b"
      - "llama3.1-8b"
      - "qwen-3-235b-a22b-instruct-2507"

  deepseek:
    name: deepseek
    base_url: "https://api.deepseek.com/v1"
    api_key: "$DEEPSEEK_API_KEY"
    tier: free
    priority: 3
    timeout: 60s
    models:
      - "deepseek-chat"
      - "deepseek-reasoner"

  cloudflare-workers:
    name: cloudflare-workers
    base_url: "https://api.cloudflare.com/client/v4/accounts"
    api_key: "$CLOUDFLARE_API_TOKEN"
    tier: free
    priority: 4
    timeout: 60s
    headers:
      CF-Account-ID: "$CLOUDFLARE_ACCOUNT_ID"
    models:
      - "@cf/meta/llama-3.3-70b-instruct"
      - "@cf/meta/llama-3.1-8b-instruct"
      - "@cf/deepseek-ai/deepseek-r1-distill-qwen-32b"
      - "@cf/google/gemma-3-12b-it"

  novita:
    name: novita
    base_url: "https://api.novita.ai/v3/openai"
    api_key: "$NOVITA_API_KEY"
    tier: free
    priority: 5
    timeout: 30s
    models:
      - "meta-llama/llama-3.1-70b-instruct"
      - "meta-llama/llama-3.1-8b-instruct"
      - "deepseek/deepseek-r1"

  chutes:
    name: chutes
    base_url: "https://api.chutes.ai/v1"
    api_key: "$CHUTES_API_KEY"
    tier: free
    priority: 6
    timeout: 60s
    models:
      - "deepseek-ai/DeepSeek-R1"
      - "meta-llama/Llama-3.1-70B-Instruct"
      - "Qwen/Qwen2.5-72B-Instruct"

  nvidia:
    name: nvidia
    base_url: "https://integrate.api.nvidia.com/v1"
    api_key: "$NVIDIA_NIM_API_KEY"
    tier: free
    priority: 7
    timeout: 60s
    models:
      - "meta/llama-3.3-70b-instruct"
      - "meta/llama-3.1-8b-instruct"
      - "nvidia/nemotron-4-340b-instruct"

  ollama:
    name: ollama
    base_url: "http://localhost:11434"
    tier: free
    priority: 8
    timeout: 120s
    models:
      - "llama3.3:70b"
      - "qwen3:32b"
      - "deepseek-r1:32b"
      - "gemma3:27b"

  # ---- PAID / HYBRID PROVIDERS (used only after free exhausted) ----

  opencode-zen:
    name: opencode-zen
    base_url: "https://opencode.ai/zen/v1"
    api_key: "$OPENCODE_API_KEY"
    tier: paid
    priority: 100
    timeout: 60s
    models:
      - "deepseek-v4-flash-free"
      - "deepseek-v4-pro"
      - "minimax-m2.5-free"

  opencode-go:
    name: opencode-go
    base_url: "https://opencode.ai/zen/go/v1"
    api_key: "$OPENCODE_API_KEY"
    tier: paid
    priority: 101
    timeout: 60s
    models:
      - "glm-5.1"
      - "kimi-k2.5"
      - "qwen3.5-plus"
      - "deepseek-v4-flash"

  openrouter:
    name: openrouter
    base_url: "https://openrouter.ai/api/v1"
    api_key: "$OPENROUTER_API_KEY"
    tier: paid
    priority: 102
    timeout: 60s
    headers:
      HTTP-Referer: "https://my-gateway.local"
      X-Title: "Super AI Gateway"
    models:
      - "meta-llama/llama-4-scout:free"
      - "google/gemini-2.0-flash-001"
      - "anthropic/claude-haiku-4.5"

  nanogpt:
    name: nanogpt
    base_url: "https://nano-gpt.com/api/v1"
    api_key: "$NANOGPT_API_KEY"
    tier: paid
    priority: 103
    timeout: 60s
    models:
      - "gpt-4o-mini"
      - "claude-3.5-haiku"

  vercel-ai-gateway:
    name: vercel-ai-gateway
    base_url: "https://ai-gateway.vercel.sh/v1"
    api_key: "$VERCEL_AI_GATEWAY_KEY"
    tier: paid
    priority: 104
    timeout: 30s
    models:
      - "gpt-4o-mini"
      - "claude-3.5-haiku"

  ollama-cloud:
    name: ollama-cloud
    base_url: "https://api.ollama.com"
    api_key: "$OLLAMA_API_KEY"
    tier: paid
    priority: 105
    timeout: 120s
    models:
      - "gpt-oss:20b"
      - "deepseek-v4-pro"

  cloudflare-gateway:
    name: cloudflare-gateway
    base_url: "https://gateway.ai.cloudflare.com/v1/${CLOUDFLARE_ACCOUNT_ID}/my-gateway"
    api_key: "$CLOUDFLARE_GATEWAY_KEY"
    tier: paid
    priority: 106
    timeout: 60s
    models:
      - "gpt-4o-mini"
      - "claude-3.5-haiku"
